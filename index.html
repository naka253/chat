<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Realtime Chat</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  background:#f3f4f6;
  height:100vh;
}

/* 非表示 */
.hidden{
  display:none !important;
}

/* ログイン画面 */
#loginScreen{
  width:100%;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:90%;
  max-width:400px;

  background:white;
  padding:30px;

  border-radius:16px;

  box-shadow:0 4px 10px rgba(0,0,0,0.1);

  display:flex;
  flex-direction:column;
  gap:15px;
}

.card h1{
  text-align:center;
}

.card input{
  padding:14px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}

.card button{
  padding:14px;
  border:none;
  border-radius:10px;

  background:#2563eb;
  color:white;

  font-size:16px;
  cursor:pointer;
}

/* チャット画面 */
#chatScreen{
  height:100vh;

  display:flex;
  flex-direction:column;
}

/* 上バー */
.topbar{
  background:#2563eb;
  color:white;

  padding:15px;

  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* メッセージエリア */
#messages{
  flex:1;

  overflow-y:auto;

  padding:15px;

  display:flex;
  flex-direction:column;
  gap:10px;
}

/* メッセージ */
.message{
  max-width:80%;
  padding:12px;

  border-radius:12px;

  word-break:break-word;
}

/* 自分 */
.mine{
  align-self:flex-end;
  background:#2563eb;
  color:white;
}

/* 相手 */
.other{
  align-self:flex-start;
  background:white;
  border:1px solid #ddd;
}

.username{
  font-size:12px;
  margin-bottom:5px;
  opacity:0.7;
}

/* システム通知 */
.system{
  text-align:center;
  color:#666;
  font-size:13px;
}

/* 入力欄 */
#messageForm{
  display:flex;
  gap:10px;

  padding:10px;

  background:white;
  border-top:1px solid #ddd;
}

#messageInput{
  flex:1;

  padding:14px;

  border-radius:10px;
  border:1px solid #ccc;

  font-size:16px;
}

#messageForm button{
  padding:0 20px;

  border:none;
  border-radius:10px;

  background:#2563eb;
  color:white;

  cursor:pointer;
}

/* スマホ */
@media(max-width:600px){

  .topbar h2{
    font-size:18px;
  }

  #messageInput{
    font-size:14px;
  }

  #messageForm button{
    padding:0 15px;
  }
}
</style>
</head>

<body>

<!-- ログイン -->
<div id="loginScreen">

  <div class="card">

    <h1>Realtime Chat</h1>

    <input
      type="text"
      id="usernameInput"
      placeholder="名前を入力"
      maxlength="20"
    />

    <button id="joinBtn">
      入室する
    </button>

  </div>

</div>

<!-- チャット -->
<div id="chatScreen" class="hidden">

  <header class="topbar">
    <h2>チャットルーム</h2>
    <span id="myName"></span>
  </header>

  <main id="messages"></main>

  <form id="messageForm">

    <input
      type="text"
      id="messageInput"
      placeholder="メッセージを入力"
      autocomplete="off"
    />

    <button type="submit">
      送信
    </button>

  </form>

</div>

<!-- Socket.IO -->
<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

/* 要素取得 */
const loginScreen = document.getElementById("loginScreen");
const chatScreen = document.getElementById("chatScreen");

const usernameInput = document.getElementById("usernameInput");
const joinBtn = document.getElementById("joinBtn");

const myName = document.getElementById("myName");

const messages = document.getElementById("messages");

const messageForm = document.getElementById("messageForm");
const messageInput = document.getElementById("messageInput");

let username = "";

/* 入室 */
joinBtn.addEventListener("click", () => {

  const name = usernameInput.value.trim();

  if(!name){
    alert("名前を入力してください");
    return;
  }

  username = name;

  myName.textContent = username;

  /* 画面切替 */
  loginScreen.classList.add("hidden");
  chatScreen.classList.remove("hidden");

  /* サーバーへ送信 */
  socket.emit("join", username);
});

/* Enterでも入室 */
usernameInput.addEventListener("keydown", (e) => {

  if(e.key === "Enter"){
    joinBtn.click();
  }
});

/* メッセージ送信 */
messageForm.addEventListener("submit", (e) => {

  e.preventDefault();

  const text = messageInput.value.trim();

  if(!text) return;

  socket.emit("chat message", {
    username,
    text
  });

  messageInput.value = "";
});

/* メッセージ受信 */
socket.on("chat message", (data) => {

  const div = document.createElement("div");

  div.classList.add("message");

  if(data.username === username){
    div.classList.add("mine");
  }else{
    div.classList.add("other");
  }

  div.innerHTML = `
    <div class="username">${escapeHtml(data.username)}</div>
    <div>${escapeHtml(data.text)}</div>
  `;

  messages.appendChild(div);

  scrollBottom();
});

/* システム通知 */
socket.on("system message", (text) => {

  const div = document.createElement("div");

  div.classList.add("system");

  div.textContent = text;

  messages.appendChild(div);

  scrollBottom();
});

/* 下へスクロール */
function scrollBottom(){

  messages.scrollTop = messages.scrollHeight;
}

/* XSS対策 */
function escapeHtml(text){

  const div = document.createElement("div");

  div.textContent = text;

  return div.innerHTML;
}
</script>

</body>
</html>
